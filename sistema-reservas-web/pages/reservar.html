<main>

<h2>Formulario de Reserva</h2>

<form id="formReserva">

<label>Nombre</label>
<input type="text" id="nombre" required>

<label>Email</label>
<input type="email" id="email" required>

<label>Servicio</label>
<select id="servicio">

<option>Corte de cabello</option>
<option>Afeitado</option>
<option>Corte + Barba</option>
<option>Asesoría</option>

</select>

<label>Fecha</label>
<input type="date" id="fecha" required>

<label>Hora</label>
<select id="hora">

<option>09:00</option>
<option>10:00</option>
<option>11:00</option>
<option>12:00</option>
<option>14:00</option>
<option>15:00</option>
<option>16:00</option>

</select>

<button type="submit">Reservar</button>

</form>

<p id="mensaje"></p>

<h2>Citas Reservadas</h2>

<ul id="listaReservas"></ul>

</main>

<footer>

<p>2026 Sistema de Reservas</p>

</footer>
